<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Notorious B.I.G. - Juicy: Interactive Comic</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Rock+Salt&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .font-marker { font-family: 'Permanent Marker', cursive; }
        .font-bangers { font-family: 'Bangers', cursive; }
        .font-signature { font-family: 'Rock Salt', cursive; }
        .perspective-1000 { perspective: 1000px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .comic-panel {
            box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
            border: 3px solid black;
        }
        
        @media (min-width: 640px) {
            .comic-panel {
                box-shadow: 10px 10px 0px rgba(0,0,0,0.8);
                border: 4px solid black;
            }
        }
    </style>
</head>
<body class="bg-gray-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- ICONS ---
        const Icon = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const ChevronLeft = (props) => <Icon {...props}><path d="m15 18-6-6 6-6"/></Icon>;
        const ChevronRight = (props) => <Icon {...props}><path d="m9 18 6-6-6-6"/></Icon>;
        const ChevronDown = (props) => <Icon {...props}><path d="m6 9 6 6 6-6"/></Icon>;
        const Play = (props) => <Icon {...props}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
        const Pause = (props) => <Icon {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></Icon>;
        const Volume2 = (props) => <Icon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
        const VolumeX = (props) => <Icon {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></Icon>;
        const Disc = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Zap = (props) => <Icon {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const Maximize = (props) => <Icon {...props}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></Icon>;
        const AlertCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const Loader2 = (props) => <Icon {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;

        // --- DATA ---
        // Pointing directly to your Juicy comic book repository so images load globally!
        const REPO_BASE_URL = "https://raw.githubusercontent.com/sinanseden-eng/juicy-comic-book/main/";
        const CACHE_BUSTER = "?v=1";
        
        // 12-page structure with perfectly synced timestamps
        const pages = [
            { id: 1, type: "intro", bgColor: "bg-neutral-950", timestamp: 0 },
            { id: 2, image: `${REPO_BASE_URL}2.jpg${CACHE_BUSTER}`, bgColor: "bg-stone-900", timestamp: 22 },
            { id: 3, image: `${REPO_BASE_URL}3.jpg${CACHE_BUSTER}`, bgColor: "bg-red-950", timestamp: 36 },
            { id: 4, image: `${REPO_BASE_URL}4.jpg${CACHE_BUSTER}`, bgColor: "bg-yellow-900", timestamp: 47 },
            { id: 5, image: `${REPO_BASE_URL}5.jpg${CACHE_BUSTER}`, bgColor: "bg-indigo-950", timestamp: 65 },
            { id: 6, image: `${REPO_BASE_URL}6.jpg${CACHE_BUSTER}`, bgColor: "bg-amber-950", timestamp: 91 },
            { id: 7, image: `${REPO_BASE_URL}7.jpg${CACHE_BUSTER}`, bgColor: "bg-orange-900", timestamp: 113 },
            { id: 8, image: `${REPO_BASE_URL}8.jpg${CACHE_BUSTER}`, bgColor: "bg-blue-950", timestamp: 139 },
            { id: 9, image: `${REPO_BASE_URL}9.jpg${CACHE_BUSTER}`, bgColor: "bg-emerald-950", timestamp: 161 },
            { id: 10, image: `${REPO_BASE_URL}10.jpg${CACHE_BUSTER}`, bgColor: "bg-fuchsia-950", timestamp: 182 },
            { id: 11, image: `${REPO_BASE_URL}11.jpg${CACHE_BUSTER}`, bgColor: "bg-yellow-600", timestamp: 195 },
            { id: 12, image: `${REPO_BASE_URL}12.jpg${CACHE_BUSTER}`, bgColor: "bg-sky-600", timestamp: 208 }
        ];

        // --- APP ---
        const ComicReader = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [audioStatus, setAudioStatus] = useState('loading');
            const [autoFlip, setAutoFlip] = useState(true);
            const [isImmersive, setIsImmersive] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [imageError, setImageError] = useState(false);
            
            const playerRef = useRef(null);
            const requestRef = useRef(null);
            const lastTimeRef = useRef(performance.now());
            const bufferingTimeoutRef = useRef(null); 
            const [isPlayerReady, setIsPlayerReady] = useState(false);

            const totalPages = pages.length;
            const videoId = "VueEh2hvNIE";

            const toggleImmersive = async () => {
                if (!document.fullscreenElement) {
                    try {
                        await document.documentElement.requestFullscreen();
                        setIsImmersive(true);
                    } catch (err) {
                        setIsImmersive(true); 
                    }
                } else {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    }
                    setIsImmersive(false);
                }
            };

            useEffect(() => {
                const handleFullscreenChange = () => setIsImmersive(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            // --- YOUTUBE API SETUP ---
            useEffect(() => {
                const initializePlayer = () => {
                    if (!document.getElementById('youtube-player')) {
                        setTimeout(initializePlayer, 100);
                        return;
                    }
                    
                    if (playerRef.current && typeof playerRef.current.destroy === 'function') {
                        playerRef.current.destroy();
                    }

                    const safeOrigin = window.location.origin !== 'null' ? window.location.origin : 'https://example.com';

                    playerRef.current = new window.YT.Player('youtube-player', {
                        videoId: videoId,
                        width: '100%',
                        height: '100%',
                        host: 'https://www.youtube-nocookie.com',
                        playerVars: { 
                            'autoplay': 0, 
                            'controls': 0, 
                            'disablekb': 1, 
                            'rel': 0,
                            'playsinline': 1,
                            'origin': safeOrigin,
                            'widget_referrer': window.location.href,
                            'modestbranding': 1
                        },
                        events: {
                            'onReady': (e) => {
                                setIsPlayerReady(true);
                                setAudioStatus('ready');
                            },
                            'onStateChange': (e) => {
                                if (bufferingTimeoutRef.current) clearTimeout(bufferingTimeoutRef.current);

                                if (e.data === window.YT.PlayerState.PLAYING) {
                                    setIsPlaying(true);
                                    setAudioStatus('ready');
                                } else if (e.data === window.YT.PlayerState.PAUSED || e.data === window.YT.PlayerState.ENDED) {
                                    setIsPlaying(false);
                                } else if (e.data === window.YT.PlayerState.BUFFERING) {
                                    setAudioStatus('loading');
                                    bufferingTimeoutRef.current = setTimeout(() => {
                                        if (playerRef.current && playerRef.current.getPlayerState && playerRef.current.getPlayerState() === window.YT.PlayerState.BUFFERING) {
                                            setAudioStatus('error');
                                            setIsPlaying(false);
                                        }
                                    }, 3000);
                                }
                            },
                            'onError': (e) => {
                                console.warn(`YouTube Error Code: ${e.data}.`);
                                setAudioStatus('error'); 
                                setIsPlaying(false);
                            }
                        }
                    });
                };

                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    window.onYouTubeIframeAPIReady = initializePlayer;
                } else if (window.YT && window.YT.Player) {
                    initializePlayer();
                }
                
                return () => {
                    if (bufferingTimeoutRef.current) clearTimeout(bufferingTimeoutRef.current);
                    if (playerRef.current && typeof playerRef.current.destroy === 'function') {
                        playerRef.current.destroy();
                    }
                };
            }, [videoId]);

            // --- SMOOTH POLLING FOR SYNC ---
            const updateTime = useCallback(() => {
                const now = performance.now();
                lastTimeRef.current = now;

                let time = currentTime;
                let isCurrentlyPlaying = false;

                if (playerRef.current && playerRef.current.getCurrentTime && isPlaying) {
                    time = playerRef.current.getCurrentTime();
                    isCurrentlyPlaying = true;
                }

                if (isCurrentlyPlaying) {
                    setCurrentTime(time);
                    if (autoFlip) {
                        let activeIndex = 0;
                        for (let i = 0; i < pages.length; i++) {
                            if (time >= pages[i].timestamp) activeIndex = i;
                            else break;
                        }
                        if (activeIndex !== currentPage) setCurrentPage(activeIndex);
                    }
                }
                
                requestRef.current = requestAnimationFrame(updateTime);
            }, [isPlaying, autoFlip, currentPage, currentTime]);

            useEffect(() => {
                requestRef.current = requestAnimationFrame(updateTime);
                return () => cancelAnimationFrame(requestRef.current);
            }, [updateTime]);

            const togglePlay = () => {
                if (!isPlayerReady || !playerRef.current || typeof playerRef.current.playVideo !== 'function') return;
                
                if (isPlaying) {
                    playerRef.current.pauseVideo();
                    setIsPlaying(false);
                } else {
                    playerRef.current.playVideo();
                }
            };

            const toggleMute = () => {
                if (playerRef.current && typeof playerRef.current.isMuted === 'function') {
                    if (isMuted) playerRef.current.unMute();
                    else playerRef.current.mute();
                }
                setIsMuted(!isMuted);
            };

            const nextPage = () => currentPage < totalPages - 1 && setCurrentPage(currentPage + 1);
            const prevPage = () => currentPage > 0 && setCurrentPage(currentPage - 1);

            useEffect(() => setImageError(false), [currentPage]);

            const currentData = pages[currentPage];

            return (
                <div className="flex flex-col h-[100dvh] bg-gray-950 text-white font-sans overflow-hidden relative selection:bg-yellow-400 selection:text-black">
                    
                    {isImmersive && (
                        <button 
                            onClick={toggleImmersive}
                            className="absolute top-2 left-2 z-50 bg-gray-900/50 text-white/60 px-3 py-1.5 rounded-lg border border-gray-700 shadow-md hover:text-yellow-400 hover:bg-gray-900/95 transition-all flex items-center gap-1.5 animate-in fade-in backdrop-blur-md"
                        >
                            <ChevronDown size={14} />
                            <span className="text-[10px] font-bold tracking-wider">MENU</span>
                        </button>
                    )}

                    {/* Header */}
                    <header className={`h-14 sm:h-16 shrink-0 bg-neutral-900 border-b border-neutral-800 flex items-center justify-between px-2 sm:px-4 z-40 transition-transform duration-300 ease-in-out ${isImmersive ? '-translate-y-full absolute top-0 w-full' : 'translate-y-0 relative'}`}>
                        <div className="flex items-center space-x-2 text-yellow-500 shrink-0">
                            <Disc size={20} className="sm:w-6 sm:h-6" />
                            <div className="hidden sm:flex flex-col mt-1">
                                <span className="font-bangers text-xl sm:text-2xl tracking-widest leading-none">JUICY</span>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-2 sm:gap-4 bg-black/60 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full border border-neutral-700 shadow-inner">
                            <div className="hidden md:flex items-center border-r border-neutral-600 pr-3 mr-1">
                                {audioStatus === 'loading' ? (
                                    <Loader2 size={14} className="animate-spin text-blue-400 mr-2" />
                                ) : audioStatus === 'error' ? (
                                    <AlertCircle size={14} className="text-red-500 mr-2" />
                                ) : (
                                    <span className={`w-2 h-2 rounded-full bg-green-500 animate-pulse mr-2 shadow-[0_0_8px_rgba(34,197,94,0.8)]`}></span>
                                )}
                                <span className="text-[10px] font-bold text-gray-300 tracking-widest uppercase">
                                    {audioStatus === 'loading' ? 'Buffering' : 'YT Sync'}
                                </span>
                            </div>

                            <button onClick={toggleImmersive} className="p-1 text-gray-400 hover:text-white transition-colors hidden sm:block" title="Full Screen Immersive Mode">
                                <Maximize size={18}/>
                            </button>
                            <button onClick={() => setAutoFlip(!autoFlip)} className={`p-1 ${autoFlip ? 'text-green-500' : 'text-gray-500'} hidden sm:block`} title="Auto-Flip Toggle"><Zap size={18}/></button>
                            <button onClick={togglePlay} className="text-white hover:text-yellow-400 transition-colors px-1">
                                {isPlaying ? <Pause size={22} /> : <Play size={22} />}
                            </button>
                            <button onClick={toggleMute} className="p-1 text-gray-400 hover:text-white transition-colors">
                                {isMuted ? <VolumeX size={18} /> : <Volume2 size={18} />}
                            </button>
                        </div>

                        <div className="flex items-center gap-2 shrink-0">
                            <div className="text-xs sm:text-sm font-mono text-gray-500 w-8 sm:w-12 text-right">{currentPage + 1}/{totalPages}</div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 min-h-0 relative flex items-center justify-center p-2 sm:p-4 w-full bg-neutral-950">
                        <button onClick={prevPage} className="absolute left-2 sm:left-4 z-40 p-2 bg-black/50 border border-white/20 text-white/50 hover:text-white hover:bg-yellow-500/50 rounded-full transition-colors"><ChevronLeft size={28}/></button>
                        <button onClick={nextPage} className="absolute right-2 sm:right-4 z-40 p-2 bg-black/50 border border-white/20 text-white/50 hover:text-white hover:bg-yellow-500/50 rounded-full transition-colors"><ChevronRight size={28}/></button>

                        <div className="w-full max-w-5xl h-full flex flex-col items-center justify-center">
                            
                            {/* Comic Container */}
                            <div className="comic-panel relative w-full h-full bg-stone-200 flex flex-col overflow-hidden rounded-lg sm:rounded-none">
                                
                                {/* TOP: Animated Comic Image Area */}
                                <div className="flex-1 relative overflow-hidden bg-neutral-900 flex items-center justify-center w-full min-h-0 border-b-4 border-black">
                                    
                                    {/* The keyed element handles the fade transition for images ONLY */}
                                    <div key={currentPage} className={`absolute inset-0 flex items-center justify-center animate-in fade-in zoom-in-95 duration-500 ${currentData.bgColor} p-4 sm:p-8`}>
                                        
                                        {/* Image Placeholder / Error State */}
                                        <div className="absolute text-center opacity-50 z-0 border border-dashed border-white/30 p-6 rounded bg-black/30 backdrop-blur-sm">
                                            <div className="text-xl font-bold font-mono text-white/80">SYS.IMG_MISSING</div>
                                            <div className="text-sm font-mono text-white/60 mt-1">Check Repo for: <span className="text-yellow-400">{currentPage + 1}.jpg</span></div>
                                        </div>

                                        {currentData.image && !imageError && (
                                            <img 
                                                src={currentData.image} 
                                                className="w-full h-full transition-all duration-300 object-cover relative z-10 shadow-[0_0_15px_rgba(0,0,0,0.5)] border-2 border-black"
                                                alt={`Panel ${currentPage + 1}`}
                                                onError={() => setImageError(true)}
                                            />
                                        )}
                                        
                                        <div className="absolute inset-0 opacity-10 pointer-events-none z-20" style={{ backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '8px 8px' }}></div>
                                        
                                        {currentData.type === 'intro' && (
                                            <div className="absolute inset-0 bg-black/70 flex flex-col items-center justify-center p-4 sm:p-8 text-center z-30">
                                                <h1 className="text-5xl sm:text-7xl font-black text-white font-bangers tracking-wider drop-shadow-[0_4px_0_rgba(0,0,0,1)] transform -rotate-2 mb-2">JUICY</h1>
                                                <h2 className="text-xl sm:text-3xl font-marker text-yellow-500 transform rotate-1 mt-2">The Notorious B.I.G.</h2>
                                                <p className="mt-8 font-mono text-sm sm:text-base text-stone-400 uppercase tracking-widest border border-stone-600 px-4 py-2 bg-black/50">"It was all a dream..."</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                {/* BOTTOM: YouTube Lyric Video Area (Dialogue Panel) */}
                                <div className="shrink-0 bg-stone-900 p-2 sm:p-4 flex items-center justify-center relative h-[35vh] max-h-[350px] w-full z-30">
                                    
                                    {/* YouTube Player constrained to 16:9 so lyrics are perfectly readable */}
                                    <div className="w-full h-full max-w-3xl aspect-video rounded border-2 border-black overflow-hidden relative shadow-[4px_4px_0px_rgba(0,0,0,1)] bg-black">
                                        
                                        {/* pointer-events-none makes sure users interact with custom controls, not iframe popups */}
                                        <div id="youtube-player" className="absolute inset-0 w-full h-full pointer-events-none"></div>
                                        
                                        {audioStatus === 'error' && (
                                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-black text-center p-4">
                                                <AlertCircle size={32} className="text-red-500 mb-2" />
                                                <p className="text-white font-mono text-sm">YouTube connection blocked by Sandbox.</p>
                                                <p className="text-gray-400 font-mono text-xs mt-1">Export this file to a standard browser to view the synced lyrics.</p>
                                            </div>
                                        )}

                                    </div>

                                </div>
                                
                                <div className="absolute bottom-2 left-4 sm:bottom-4 sm:left-6 font-signature text-xl sm:text-3xl text-white/40 pointer-events-none z-40 drop-shadow-md">Sinan</div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComicReader />);
    </script>
</body>
</html>
